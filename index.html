<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AI Story Idea Generator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>✨ AI Story Idea Generator</h1>

    <p class="subtitle">
        Turn your imagination into an amazing story idea.
    </p>

    <div class="form-group">

        <label for="genre">Choose Genre</label>

        <select id="genre">
            <option value="Horror">Horror</option>
            <option value="Science Fiction">Science Fiction</option>
            <option value="Mystery">Mystery</option>
            <option value="Fantasy">Fantasy</option>
            <option value="Adventure">Adventure</option>
            <option value="Romance">Romance</option>
        </select>

    </div>


    <div class="form-group">

        <label for="theme">Choose Theme</label>

        <select id="theme">
            <option value="Friendship">Friendship</option>
            <option value="Survival">Survival</option>
            <option value="Hope">Hope</option>
            <option value="Revenge">Revenge</option>
            <option value="Sacrifice">Sacrifice</option>
            <option value="Discovery">Discovery</option>
        </select>

    </div>


    <div class="form-group">

        <label for="character">Main Character</label>

        <select id="character">
            <option value="Student">Student</option>
            <option value="Farmer">Farmer</option>
            <option value="Detective">Detective</option>
            <option value="Scientist">Scientist</option>
            <option value="Robot">Robot</option>
            <option value="Explorer">Explorer</option>
        </select>

    </div>


    <div class="form-group">

        <label for="setting">Story Setting</label>

        <select id="setting">
            <option value="Ancient Village">Ancient Village</option>
            <option value="Future City">Future City</option>
            <option value="Dark Forest">Dark Forest</option>
            <option value="Space Station">Space Station</option>
            <option value="College Campus">College Campus</option>
            <option value="Abandoned Island">Abandoned Island</option>
        </select>

    </div>


    <button onclick="generateStory()">
        Generate Story Idea 🚀
    </button>


    <div id="result" class="result hidden">

        <h2 id="storyTitle"></h2>

        <p>
            <strong>Genre:</strong>
            <span id="outputGenre"></span>
        </p>

        <p>
            <strong>Theme:</strong>
            <span id="outputTheme"></span>
        </p>

        <p>
            <strong>Main Character:</strong>
            <span id="outputCharacter"></span>
        </p>

        <h3>📖 Story Idea</h3>
        <p id="storyIdea"></p>

        <h3>⚔️ Main Conflict</h3>
        <p id="conflict"></p>

        <h3>😱 Twist Ending</h3>
        <p id="twist"></p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
